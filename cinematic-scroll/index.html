<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Boldonse&display=swap"
      rel="stylesheet"
    />

    <title>Cinematic Scroll</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="scroll-section">
      <h1>
        Build to flow with your story <br />
        not fight it
      </h1>
    </section>

    <section class="benefit-section">
      <div class="container">
        <div class="col-center">
          <p class="paragraph-animation">
            Step into mountain calm <br />
            Nature tells the story.
          </p>
        </div>

        <div class="title-group">
          <div
            class="clip-title first-title"
            data-bg="#1b211a"
            data-color="#ffffff"
          >
            Quiet peaks
          </div>
          <div
            class="clip-title second-title"
            data-bg="#628141"
            data-color="#ffffff"
          >
            Pure air energy
          </div>
          <div
            class="clip-title third-title"
            data-bg="#ebd5ab"
            data-color="#444444"
          >
            Endlessly renewable
          </div>
          <div
            class="clip-title fourth-title"
            data-bg="#2f5755"
            data-color="#ffffff"
          >
            Clean as alpine snow
          </div>
        </div>

        <p class="more-text">And the journey continues beyond the summit</p>
      </div>

      <div class="vd-pin overlay-box">
        <div class="video-wrapper">
          <div class="video-box">
            <img
              class="spin-circle"
              src="./assets/rotate-text.png"
              alt="rotate text"
            />

            <video
              src="https://www.pexels.com/download/video/8290926/"
              autoplay
              muted
              loop
              playsinline
            ></video>

            <div class="play-wrap">
              <div class="play-circle">
                <img src="./assets/play-icon.png" alt="play icon" />
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="scroll-section">
      <h2>Where every scroll feels intentional</h2>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/SplitText.min.js"></script>

    <script src="https://unpkg.com/lenis@1.3.17/dist/lenis.min.js"></script>

    <script src="script.js"></script>
  </body>
</html>
